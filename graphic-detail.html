<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Graphic Detail | Portfolio</title>
    <meta name="description" content="그래픽 디자인 작업물 상세 페이지">

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/graphic-detail.css">
</head>
<body>

<!-- Header -->
<header class="header" id="header">
    <a href="index.html" class="header__logo">Portfolio.</a>

    <nav class="header__nav" aria-label="주요 메뉴">
        <ul class="gnb">
            <li><a href="index.html#about"      class="gnb__link">About</a></li>
            <li><a href="index.html#publishing" class="gnb__link">Web Publishing</a></li>
            <li><a href="index.html#graphic"    class="gnb__link is-active">Graphic</a></li>
            <li><a href="index.html#uxui"       class="gnb__link">UI/UX Design</a></li>
        </ul>
    </nav>

    <div class="header__actions">
        <a href="index.html#contact" class="btn btn--primary btn--sm">Contact</a>
        <button class="hamburger" aria-label="메뉴 열기" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>

<!-- Mobile Nav -->
<div class="mobile-nav" aria-hidden="true">
    <ul class="mobile-nav__list">
        <li><a href="index.html#about"      class="mobile-nav__link">About</a></li>
        <li><a href="index.html#publishing" class="mobile-nav__link">Web Publishing</a></li>
        <li><a href="index.html#graphic"    class="mobile-nav__link">Graphic</a></li>
        <li><a href="index.html#uxui"       class="mobile-nav__link">UI/UX Design</a></li>
        <li><a href="index.html#contact"    class="mobile-nav__link">Contact</a></li>
    </ul>
</div>

<!-- Hero -->
<div class="gd-hero" id="gd-hero">
    <div class="gd-hero__img-wrap">
        <img src="" alt="" id="gd-hero-img" class="gd-hero__img">
        <div class="gd-hero__overlay" aria-hidden="true"></div>
    </div>
    <div class="gd-hero__content">
        <p class="gd-hero__category" id="gd-category"></p>
        <h1 class="gd-hero__title"   id="gd-title"></h1>
    </div>
</div>

<!-- Overview -->
<section class="gd-overview section">
    <div class="section__inner">
        <p class="gd-overview__text" id="gd-overview"></p>
    </div>
</section>

<!-- Meta + Description -->
<section class="section section--light">
    <div class="section__inner">
        <div class="gd-layout">

            <!-- 좌: 프로젝트 정보 -->
            <aside class="gd-meta">
                <h2 class="gd-meta__title">프로젝트 정보</h2>
                <dl class="gd-meta__list" id="gd-meta"></dl>
            </aside>

            <!-- 우: 디자인 컨셉 + 설명 -->
            <div class="gd-content">
                <h2 class="gd-content__title">디자인 컨셉</h2>
                <p class="gd-content__concept" id="gd-concept"></p>
                <h2 class="gd-content__title" style="margin-top: 36px;">프로젝트 설명</h2>
                <div class="gd-content__desc" id="gd-desc"></div>
            </div>

        </div>
    </div>
</section>

<!-- Gallery -->
<section class="section">
    <div class="section__inner">
        <div class="gd-gallery__header">
            <p class="gd-gallery__eyebrow">Work Images</p>
            <h2 class="gd-gallery__title">작업물</h2>
        </div>
        <div class="gd-gallery__grid" id="gd-gallery"></div>
    </div>
</section>

<!-- Retrospective -->
<section class="section section--light">
    <div class="section__inner">
        <div class="gd-retro__header">
            <p class="gd-retro__eyebrow">Retrospective</p>
            <h2 class="gd-retro__title">프로젝트 회고</h2>
        </div>
        <div class="gd-retro__grid">
            <div class="gd-retro__item">
                <div class="gd-retro__icon" aria-hidden="true">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <h3 class="gd-retro__subtitle">배운 점</h3>
                <p class="gd-retro__text" id="gd-learned"></p>
            </div>
            <div class="gd-retro__item">
                <div class="gd-retro__icon" aria-hidden="true">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </div>
                <h3 class="gd-retro__subtitle">디자인 의도</h3>
                <p class="gd-retro__text" id="gd-intent"></p>
            </div>
        </div>
    </div>
</section>

<!-- Project Navigation -->
<div class="gd-nav section">
    <div class="section__inner">
        <div class="gd-nav__inner">
            <a href="#" id="gd-prev-link" class="gd-nav__item gd-nav__item--prev" hidden>
                <span class="gd-nav__dir">← 이전 프로젝트</span>
                <span class="gd-nav__name" id="gd-prev-name"></span>
            </a>
            <a href="index.html#graphic" class="gd-nav__back btn btn--ghost">
                목록으로 돌아가기
            </a>
            <a href="#" id="gd-next-link" class="gd-nav__item gd-nav__item--next" hidden>
                <span class="gd-nav__dir">다음 프로젝트 →</span>
                <span class="gd-nav__name" id="gd-next-name"></span>
            </a>
        </div>
    </div>
</div>

<!-- Scroll Top -->
<button class="scroll-top" aria-label="맨 위로 이동">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="js/graphic-data.js"></script>
<script src="js/graphic-detail.js"></script>
</body>
</html>
